version: '3.8'

services:
  webserver:
    image: nginx:alpine
    container_name: php_users_manager_nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: php_users_manager_app
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html

  db:
    image: mysql:8.0
    container_name: php_users_manager_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
